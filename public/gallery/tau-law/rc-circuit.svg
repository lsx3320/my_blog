<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300" fill="none" stroke="#333" stroke-width="2">
  <rect x="1" y="1" width="498" height="298" rx="12" fill="#f8f9fa"/>
  <!-- Battery -->
  <line x1="60" y1="150" x2="60" y2="80" stroke-width="2"/>
  <line x1="50" y1="80" x2="70" y2="80" stroke-width="3"/>
  <line x1="55" y1="70" x2="65" y2="70" stroke-width="1.5"/>
  <text x="42" y="60" font-size="14" fill="#666" font-family="Arial">V</text>
  <!-- Top wire -->
  <line x1="60" y1="150" x2="60" y2="60" stroke-width="2"/>
  <line x1="60" y1="60" x2="180" y2="60" stroke-width="2"/>
  <!-- Resistor R -->
  <rect x="180" y="45" width="60" height="30" rx="4" fill="#e3f2fd" stroke="#1976d2"/>
  <text x="195" y="66" font-size="16" fill="#1976d2" font-weight="bold" font-family="Arial">R</text>
  <line x1="240" y1="60" x2="320" y2="60" stroke-width="2"/>
  <!-- Capacitor C -->
  <line x1="320" y1="35" x2="320" y2="85" stroke-width="2"/>
  <line x1="340" y1="35" x2="340" y2="85" stroke-width="2"/>
  <line x1="320" y1="60" x2="340" y2="60" stroke-width="0"/>
  <text x="348" y="66" font-size="16" fill="#1976d2" font-weight="bold" font-family="Arial">C</text>
  <!-- Bottom wire -->
  <line x1="340" y1="60" x2="420" y2="60" stroke-width="2"/>
  <line x1="420" y1="60" x2="420" y2="220" stroke-width="2"/>
  <line x1="60" y1="220" x2="420" y2="220" stroke-width="2"/>
  <line x1="60" y1="150" x2="60" y2="220" stroke-width="2"/>
  <!-- Tau formula -->
  <text x="140" y="180" font-size="28" fill="#d32f2f" font-weight="bold" font-family="serif">τ = R × C</text>
  <!-- Water bucket analogy -->
  <text x="120" y="240" font-size="13" fill="#888" font-family="Arial">电容 C ≈ 水桶大小 | 电阻 R ≈ 水管粗细</text>
  <!-- Labels -->
  <text x="185" y="100" font-size="11" fill="#1976d2" font-family="Arial">电阻</text>
  <text x="305" y="105" font-size="11" fill="#1976d2" font-family="Arial">电容</text>
</svg>